<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAP ZOOM PRO - Pure P2P Communication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #1e1b4b, #2e1065);
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        .font-heading { font-family: 'Space Grotesk', sans-serif; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neon-border-cyan {
            border: 1px solid rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        .video-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
            align-content: center;
            transition: all 0.5s ease;
        }

        /* Logic Pin Layar */
        .video-grid.has-pinned .video-tile:not(.is-pinned) {
            display: none;
        }

        .video-grid.has-pinned .video-tile.is-pinned {
            flex-basis: 100% !important;
            max-width: 100% !important;
            height: 100%;
            aspect-ratio: auto;
        }

        .video-tile {
            position: relative;
            background: #000;
            border-radius: 1.25rem;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 2px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-grow: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-label {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.35rem 0.85rem;
            border-radius: 0.75rem;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 10;
        }

        .hand-indicator {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: #facc15;
            color: #1e1b4b;
            padding: 0.5rem;
            border-radius: 50%;
            box-shadow: 0 0 15px #facc15;
            z-index: 15;
            display: none;
        }

        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Animasi Naik Turun (Melayang) */
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pop {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        #chat-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }

        #chat-panel.active {
            transform: translateX(0);
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="flex h-screen max-w-[1600px] mx-auto w-full p-4 md:p-6 overflow-hidden">
        <!-- Main Container -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Header -->
            <header class="flex-shrink-0 flex items-center justify-between mb-6">
                <div class="flex items-center space-x-4">
                    <!-- Logo dengan Animasi Melayang -->
                    <div class="p-2 glass-morphism rounded-xl neon-border-cyan animate-float">
                        <img src="https://smartcap.or.id/assets/logo.png" alt="CAP" class="h-8 w-auto filter brightness-0 invert" onerror="this.style.display='none'">
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-2xl font-black font-heading bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500">
                            CAP ZOOM PRO
                        </h1>
                        <div id="recording-status" class="hidden items-center">
                            <span class="recording-dot"></span>
                            <span class="text-[9px] text-red-500 font-bold uppercase tracking-widest">Merekam Sesi...</span>
                        </div>
                    </div>
                </div>
                <div id="connection-status" class="hidden glass-morphism px-4 py-2 rounded-xl border border-emerald-500/30 flex items-center space-x-3">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                    <span id="status-text" class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Sistem Aktif</span>
                </div>
            </header>

            <div class="flex-1 flex flex-col lg:flex-row gap-6 min-h-0">
                <!-- Sidebar: Kontrol -->
                <div class="lg:w-80 flex flex-col space-y-4 flex-shrink-0">
                    <div class="glass-morphism p-6 rounded-[2rem] border-t border-white/10">
                        <h2 class="text-[10px] font-black text-cyan-400 uppercase tracking-[0.4em] mb-4">Konfigurasi Node</h2>
                        
                        <div class="space-y-4">
                            <div id="init-form" class="space-y-4">
                                <!-- Mode Selector -->
                                <div class="flex space-x-2 border-b border-white/10 pb-2 mb-4">
                                    <button id="btn-tab-user" onclick="setMode('user')" class="flex-1 text-cyan-400 border-b-2 border-cyan-500 pb-1 text-[10px] font-bold uppercase tracking-widest transition-colors">Gabung</button>
                                    <button id="btn-tab-admin" onclick="promptAdmin()" class="flex-1 text-slate-500 border-b-2 border-transparent pb-1 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1 transition-colors hover:text-white"><i data-lucide="lock" class="w-3 h-3"></i> Admin</button>
                                </div>

                                <!-- User Form -->
                                <div id="user-form" class="space-y-4">
                                    <div>
                                        <label class="text-[9px] text-slate-500 uppercase mb-1 block">Nama Anda</label>
                                        <input type="text" id="user-name" placeholder="Contoh: Budi" class="w-full bg-black/20 text-white text-sm p-3 rounded-xl border border-white/10 focus:outline-none focus:border-cyan-500/50">
                                    </div>
                                    <div>
                                        <label class="text-[9px] text-slate-500 uppercase mb-1 block">ID Ruang (Admin)</label>
                                        <input type="text" id="room-id" placeholder="Masukkan ID Ruang..." class="w-full bg-black/20 text-white text-sm p-3 rounded-xl border border-white/10 focus:outline-none focus:border-cyan-500/50">
                                    </div>
                                    <button onclick="joinRoom()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Gabung Ruang</button>
                                </div>

                                <!-- Admin Form -->
                                <div id="admin-form" class="space-y-4 hidden">
                                    <div>
                                        <label class="text-[9px] text-fuchsia-400 uppercase mb-1 block">Nama Admin</label>
                                        <input type="text" id="admin-name" placeholder="Contoh: Pak Bos" class="w-full bg-fuchsia-900/20 text-fuchsia-100 text-sm p-3 rounded-xl border border-fuchsia-500/30 focus:outline-none focus:border-fuchsia-500">
                                    </div>
                                    <div>
                                        <label class="text-[9px] text-fuchsia-400 uppercase mb-1 block">Buat ID Ruang</label>
                                        <input type="text" id="admin-room-id" placeholder="Contoh: MEETING-01" class="w-full bg-fuchsia-900/20 text-fuchsia-100 text-sm p-3 rounded-xl border border-fuchsia-500/30 focus:outline-none focus:border-fuchsia-500">
                                    </div>
                                    <button onclick="createRoom()" class="w-full bg-gradient-to-r from-fuchsia-600 to-purple-600 hover:from-fuchsia-500 hover:to-purple-500 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Buat Ruang</button>
                                </div>
                            </div>

                            <div id="active-controls" class="hidden space-y-4">
                                <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                                    <label class="text-[9px] text-slate-500 uppercase block mb-1">ID Teks Anda</label>
                                    <div class="flex items-center justify-between">
                                        <span id="my-peer-id" class="font-mono text-xs font-bold text-cyan-400 tracking-wider">Menghubungkan...</span>
                                        <button onclick="copyId()" class="text-slate-400 hover:text-white"><i data-lucide="copy" class="w-4 h-4"></i></button>
                                    </div>
                                </div>

                                <div id="manual-dial-section" class="pt-2 border-t border-white/5 hidden">
                                    <label class="text-[9px] text-slate-500 uppercase block mb-1">Hubungi ID Teman</label>
                                    <div class="flex space-x-2">
                                        <input type="text" id="target-id" placeholder="Masukkan ID Teks..." 
                                            class="flex-1 bg-black/20 text-white text-xs p-3 rounded-xl border border-white/10 focus:outline-none">
                                        <button onclick="callPeer()" class="bg-fuchsia-600 p-3 rounded-xl hover:bg-fuchsia-500">
                                            <i data-lucide="phone" class="w-4 h-4 text-white"></i>
                                        </button>
                                    </div>
                                </div>

                                <button onclick="endSession()" class="w-full border border-white/10 hover:bg-white/5 text-slate-400 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">
                                    Keluar Sesi
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="glass-morphism p-6 rounded-[2rem] flex-1 overflow-hidden flex flex-col min-h-0">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-4">Daftar Koneksi</h2>
                        <div id="connection-list" class="space-y-2 overflow-y-auto pr-2 flex-1">
                            <p class="text-[10px] text-slate-500 italic">Belum ada koneksi aktif...</p>
                        </div>
                    </div>
                </div>

                <!-- Area Utama: Grid Video -->
                <div class="flex-1 glass-morphism rounded-[2.5rem] border border-white/10 flex flex-col overflow-hidden relative">
                    <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
                        <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4 border border-white/10">
                            <i data-lucide="video" class="w-8 h-8 text-slate-600"></i>
                        </div>
                        <h3 class="text-xl font-bold text-slate-400 font-heading">Siap untuk Terhubung?</h3>
                        <p class="text-[11px] text-slate-500 mt-2 max-w-xs uppercase tracking-wider leading-relaxed">Masukkan teks unik sebagai ID Anda, lalu klik 'Mulai Sesi'.</p>
                    </div>

                    <div id="video-container" class="video-grid hidden">
                        <!-- Tile video akan muncul di sini -->
                    </div>

                    <!-- Media Controls -->
                    <div id="media-controls" class="hidden absolute bottom-6 left-1/2 -translate-x-1/2 flex space-x-3 z-30">
                        <button id="toggle-mic" onclick="toggleMic()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all" title="Mikrofon">
                            <i data-lucide="mic" class="w-5 h-5"></i>
                        </button>
                        <button id="toggle-vid" onclick="toggleVideo()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all" title="Kamera">
                            <i data-lucide="video" class="w-5 h-5"></i>
                        </button>
                        <button id="btn-switch-camera" onclick="switchCamera()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all hidden" title="Ganti Kamera">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                        <button id="btn-record" onclick="toggleRecording()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-red-500/20 transition-all" title="Rekam Sesi">
                            <i data-lucide="circle" class="w-5 h-5"></i>
                        </button>
                        <button id="toggle-hand" onclick="toggleHand()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all" title="Angkat Tangan">
                            <i data-lucide="hand" class="w-5 h-5"></i>
                        </button>
                        <button id="toggle-chat" onclick="toggleChat()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all relative" title="Obrolan">
                            <i data-lucide="message-square" class="w-5 h-5"></i>
                            <div id="chat-badge" class="absolute top-2 right-2 w-2 h-2 bg-fuchsia-500 rounded-full hidden"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel Obrolan (Sidebar Kanan) -->
        <aside id="chat-panel" class="fixed top-0 right-0 h-full w-80 glass-morphism z-50 flex flex-col border-l border-white/10">
            <div class="p-6 border-b border-white/10 flex items-center justify-between">
                <h2 class="text-[10px] font-black text-cyan-400 uppercase tracking-[0.4em]">Obrolan Grup</h2>
                <button onclick="toggleChat()" class="text-slate-400 hover:text-white">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="text-center">
                    <p class="text-[10px] text-slate-500 italic">Selamat datang di obrolan aman P2P</p>
                </div>
            </div>

            <div class="p-4 border-t border-white/10">
                <form onsubmit="sendMessage(event)" class="flex space-x-2">
                    <input type="text" id="chat-input" placeholder="Ketik pesan..." 
                        class="flex-1 bg-black/20 text-white text-xs p-3 rounded-xl border border-white/10 focus:outline-none focus:border-cyan-500/50">
                    <button type="submit" class="bg-cyan-600 p-3 rounded-xl hover:bg-cyan-500 transition-colors">
                        <i data-lucide="send" class="w-4 h-4 text-white"></i>
                    </button>
                </form>
            </div>
        </aside>
    </div>

    <!-- Modal Password Admin -->
    <div id="password-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="glass-morphism p-6 rounded-2xl w-80 border border-white/10 animate-pop">
            <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-4 flex items-center gap-2">
                <i data-lucide="lock" class="w-4 h-4 text-fuchsia-500"></i> Otorisasi Admin
            </h3>
            <input type="password" id="admin-password" placeholder="Masukkan Password..." class="w-full bg-black/50 text-white text-sm p-3 rounded-xl border border-white/10 focus:outline-none focus:border-fuchsia-500 mb-4" onkeypress="if(event.key === 'Enter') verifyAdmin()">
            <div class="flex space-x-2">
                <button onclick="closePasswordModal()" class="flex-1 py-2 rounded-xl text-xs font-bold text-slate-400 hover:bg-white/5 transition-colors">Batal</button>
                <button onclick="verifyAdmin()" class="flex-1 bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-2 rounded-xl text-xs font-bold transition-colors">Buka Akses</button>
            </div>
        </div>
    </div>

    <div id="notif" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-morphism px-6 py-3 rounded-2xl text-[10px] font-bold tracking-widest text-white opacity-0 transition-all pointer-events-none z-50 uppercase"></div>

    <script>
        let peer = null;
        let myStream = null;
        let myId = null;
        let myAlias = "";
        let calls = {};
        let dataConnections = {};
        let peerAliases = {}; 
        let isHandRaised = false;
        let isAdminMode = false;
        let isMuteLocked = false;
        let mutedByAdmin = {}; 
        let currentFacingMode = 'user';
        let pinnedPeerId = null; 

        // Variabel Recording
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        // Manajemen Mode Admin
        function promptAdmin() {
            document.getElementById('password-modal').classList.remove('hidden');
            document.getElementById('password-modal').classList.add('flex');
            document.getElementById('admin-password').focus();
        }

        function closePasswordModal() {
            document.getElementById('password-modal').classList.add('hidden');
            document.getElementById('password-modal').classList.remove('flex');
            document.getElementById('admin-password').value = '';
        }

        function verifyAdmin() {
            const pwd = document.getElementById('admin-password').value;
            if (pwd === 'mataharisaja') { 
                closePasswordModal();
                isAdminMode = true;
                
                document.getElementById('btn-tab-user').className = "flex-1 text-slate-500 border-b-2 border-transparent pb-1 text-[10px] font-bold uppercase tracking-widest transition-colors hover:text-white";
                document.getElementById('btn-tab-admin').className = "flex-1 text-fuchsia-400 border-b-2 border-fuchsia-500 pb-1 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1 transition-colors";
                
                document.getElementById('user-form').classList.add('hidden');
                document.getElementById('admin-form').classList.remove('hidden');
                
                showNotif('Akses Admin Dibuka');
            } else {
                showNotif('Password Salah!');
            }
        }

        function setMode(mode) {
            if (mode === 'user') {
                isAdminMode = false;
                document.getElementById('btn-tab-user').className = "flex-1 text-cyan-400 border-b-2 border-cyan-500 pb-1 text-[10px] font-bold uppercase tracking-widest transition-colors";
                document.getElementById('btn-tab-admin').className = "flex-1 text-slate-500 border-b-2 border-transparent pb-1 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1 transition-colors hover:text-white";
                
                document.getElementById('admin-form').classList.add('hidden');
                document.getElementById('user-form').classList.remove('hidden');
            }
        }

        async function createRoom() {
            const nameInput = document.getElementById('admin-name').value.trim();
            const roomId = document.getElementById('admin-room-id').value.trim();
            if (!nameInput || !roomId) return showNotif("Isi Nama dan ID Ruang!");
            myAlias = nameInput;
            isAdminMode = true; // Dipastikan admin jika lewat form ini
            await initMediaAndPeer(roomId.toUpperCase(), true);
        }

        async function joinRoom() {
            const nameInput = document.getElementById('user-name').value.trim();
            const roomId = document.getElementById('room-id').value.trim();
            if (!nameInput || !roomId) return showNotif("Isi Nama dan ID Ruang!");
            myAlias = nameInput;
            isAdminMode = false; // Dipastikan peserta jika lewat form ini
            const safeUserId = myAlias.replace(/\s+/g, '-').toUpperCase() + '-' + Math.floor(Math.random() * 1000);
            await initMediaAndPeer(safeUserId, false, roomId.toUpperCase());
        }

        async function initMediaAndPeer(customId, isAdmin, targetRoomId = null) {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode }, 
                    audio: true 
                });
                initPeer(customId, isAdmin, targetRoomId);
                
                document.getElementById('init-form').classList.add('hidden');
                document.getElementById('active-controls').classList.remove('hidden');
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('media-controls').classList.remove('hidden');
                document.getElementById('connection-status').classList.remove('hidden');

                if (!isAdmin) {
                    document.getElementById('manual-dial-section').classList.add('hidden');
                    document.getElementById('btn-switch-camera').classList.add('hidden');
                } else {
                    document.getElementById('manual-dial-section').classList.remove('hidden');
                    document.getElementById('btn-switch-camera').classList.remove('hidden');
                }

                addVideoTile('local', myStream, `${myAlias} (Anda)`, true);
                showNotif(isAdmin ? "Ruang Berhasil Dibuat" : "Menghubungkan...");
            } catch (err) {
                console.error(err);
                showNotif("Gagal Akses Kamera/Mic");
            }
        }

        function initPeer(customId, isAdmin, targetRoomId) {
            peer = new Peer(customId, {
                debug: 1,
                config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
            });

            peer.on('open', (id) => {
                myId = id;
                document.getElementById('my-peer-id').innerText = id;
                if (!isAdmin && targetRoomId) connectToTarget(targetRoomId);
            });

            peer.on('call', (call) => {
                peerAliases[call.peer] = call.metadata?.alias || call.peer;
                call.answer(myStream);
                handleCall(call);
            });

            peer.on('connection', (conn) => {
                peerAliases[conn.peer] = conn.metadata?.alias || conn.peer;
                handleDataConnection(conn);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') showNotif("ID sudah dipakai.");
                else showNotif(`Peer Error: ${err.type}`);
            });
        }

        function connectToTarget(id) {
            if (id === myId || calls[id]) return;
            const conn = peer.connect(id, { metadata: { alias: myAlias } });
            handleDataConnection(conn);
            const call = peer.call(id, myStream, { metadata: { alias: myAlias } });
            handleCall(call);
        }

        function handleCall(call) {
            const peerId = call.peer;
            calls[peerId] = call;
            call.on('stream', (remoteStream) => {
                const displayName = peerAliases[peerId] || call.metadata?.alias || peerId;
                addVideoTile(peerId, remoteStream, displayName);
                updateConnectionList();
            });
            call.on('close', () => {
                removeVideoTile(peerId);
                delete calls[peerId];
                updateConnectionList();
            });
        }

        function handleDataConnection(conn) {
            const peerId = conn.peer;
            dataConnections[peerId] = conn;

            conn.on('open', () => {
                conn.send({ type: 'signal', action: 'identify', alias: myAlias });
                if (isHandRaised) conn.send({ type: 'signal', action: 'raise-hand', status: true });
                if (isAdminMode) {
                    const existingPeers = Object.keys(dataConnections).filter(id => id !== peerId && dataConnections[id].open);
                    if (existingPeers.length > 0) conn.send({ type: 'signal', action: 'peer-list', peers: existingPeers });
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    appendMessage(data.sender, data.text);
                    if (!document.getElementById('chat-panel').classList.contains('active')) {
                        document.getElementById('chat-badge').classList.remove('hidden');
                    }
                } else if (data.type === 'signal') {
                    if (data.action === 'raise-hand') updateHandIndicator(peerId, data.status);
                    else if (data.action === 'identify') {
                        peerAliases[peerId] = data.alias;
                        const label = document.querySelector(`#tile-${peerId} .user-label`);
                        if (label) label.innerText = data.alias;
                        updateConnectionList();
                    } else if (data.action === 'peer-list') {
                        data.peers.forEach(tid => { if (tid !== myId && !calls[tid]) connectToTarget(tid); });
                    }
                } else if (data.type === 'admin-action') {
                    if (data.action === 'force-mute') {
                        isMuteLocked = true;
                        const track = myStream.getAudioTracks()[0];
                        if (track) track.enabled = false;
                        document.getElementById('toggle-mic').classList.add('bg-red-500/20', 'cursor-not-allowed');
                        showNotif("Mic Anda dikunci oleh Admin.");
                    } else if (data.action === 'allow-unmute') {
                        isMuteLocked = false;
                        document.getElementById('toggle-mic').classList.remove('cursor-not-allowed');
                        showNotif("Mic Anda dibuka oleh Admin.");
                    } else if (data.action === 'force-kick') {
                        showNotif("Anda dikeluarkan oleh Admin.");
                        setTimeout(() => location.reload(), 1000);
                    }
                    lucide.createIcons();
                }
            });
        }

        // --- FITUR MODERASI (HANYA ADMIN) ---
        function adminToggleMute(peerId) {
            if (!isAdminMode) return; // Proteksi ganda
            if (!dataConnections[peerId]) return;
            
            const isMuted = !mutedByAdmin[peerId];
            mutedByAdmin[peerId] = isMuted;
            dataConnections[peerId].send({ 
                type: 'admin-action', 
                action: isMuted ? 'force-mute' : 'allow-unmute' 
            });
            
            showNotif(isMuted ? "Peserta dibisukan & kunci mic" : "Akses mic dibuka");
            const btn = document.getElementById(`admin-mute-btn-${peerId}`);
            if (btn) {
                btn.innerHTML = `<i data-lucide="${isMuted ? 'mic' : 'mic-off'}" class="w-3.5 h-3.5"></i>`;
                btn.className = `p-1.5 ${isMuted ? 'bg-red-500 text-white' : 'text-slate-300 hover:bg-red-500/50 hover:text-white'} rounded-md transition-colors`;
            }
            lucide.createIcons();
        }

        function adminKick(peerId) {
            if (!isAdminMode) return; // Proteksi ganda
            if (dataConnections[peerId]) {
                dataConnections[peerId].send({ type: 'admin-action', action: 'force-kick' });
                showNotif("Mengeluarkan peserta...");
                setTimeout(() => removeVideoTile(peerId), 500);
            }
        }

        // --- FITUR RECORDING ---
        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    recordedChunks = [];
                    mediaRecorder = new MediaRecorder(displayStream, { mimeType: 'video/webm; codecs=vp9' });
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        saveRecording();
                        displayStream.getTracks().forEach(t => t.stop());
                        setIsRecording(false);
                        showNotif("Rekaman Disimpan");
                    };
                    mediaRecorder.start();
                    setIsRecording(true);
                    showNotif("Perekaman Berjalan...");
                    displayStream.getVideoTracks()[0].onended = () => { if (isRecording) stopRecording(); };
                } catch (err) { showNotif("Gagal rekam layar."); }
            } else { stopRecording(); }
        }

        function stopRecording() { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }
        function setIsRecording(val) {
            isRecording = val;
            const btn = document.getElementById('btn-record');
            const status = document.getElementById('recording-status');
            if (isRecording) {
                btn.classList.add('bg-red-600', 'text-white');
                btn.innerHTML = `<i data-lucide="square" class="w-5 h-5"></i>`;
                status.classList.replace('hidden', 'flex');
            } else {
                btn.classList.remove('bg-red-600', 'text-white');
                btn.innerHTML = `<i data-lucide="circle" class="w-5 h-5"></i>`;
                status.classList.replace('flex', 'hidden');
            }
            lucide.createIcons();
        }

        function saveRecording() {
            if (recordedChunks.length === 0) return;
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ZOOM-REC-${new Date().getTime()}.webm`;
            a.click();
        }

        // --- MANAJEMEN LAYAR & PIN ---
        function togglePin(peerId) {
            const container = document.getElementById('video-container');
            const allTiles = document.querySelectorAll('.video-tile');
            if (pinnedPeerId === peerId) {
                pinnedPeerId = null;
                container.classList.remove('has-pinned');
                allTiles.forEach(t => t.classList.remove('is-pinned'));
                showNotif("Tampilan Grid");
            } else {
                pinnedPeerId = peerId;
                container.classList.add('has-pinned');
                allTiles.forEach(t => {
                    if (t.id === `tile-${peerId}`) t.classList.add('is-pinned');
                    else t.classList.remove('is-pinned');
                });
                showNotif("Layar Dipin");
            }
            lucide.createIcons();
            refreshGrid();
        }

        function addVideoTile(id, stream, label, isLocal = false) {
            const container = document.getElementById('video-container');
            if (document.getElementById(`tile-${id}`)) return;
            const tile = document.createElement('div');
            tile.id = `tile-${id}`;
            tile.className = `video-tile animate-pop ${isLocal ? 'border-2 border-cyan-500/40' : ''}`;
            
            // TOMBOL MODERASI HANYA UNTUK ADMIN TERHADAP ORANG LAIN
            const adminControls = (!isLocal && isAdminMode) ? `
                <div class="absolute top-2 left-2 z-20 flex space-x-1 bg-black/60 p-1 rounded-lg backdrop-blur-md border border-white/10">
                    <button id="admin-mute-btn-${id}" onclick="adminToggleMute('${id}')" class="p-1.5 text-slate-300 hover:bg-red-500/50 hover:text-white rounded-md transition-colors" title="Bisukan & Kunci Mic">
                        <i data-lucide="mic-off" class="w-3.5 h-3.5"></i>
                    </button>
                    <button onclick="adminKick('${id}')" class="p-1.5 hover:bg-red-500/50 hover:text-white text-slate-300 rounded-md transition-colors" title="Keluarkan Peserta">
                        <i data-lucide="user-minus" class="w-3.5 h-3.5"></i>
                    </button>
                </div>` : '';

            // PIN TERSEDIA UNTUK SEMUA ORANG
            const pinButtonHTML = `
                <button onclick="togglePin('${id}')" class="absolute top-2 right-2 z-20 bg-black/60 p-1.5 rounded-lg backdrop-blur-md border border-white/10 text-slate-300 hover:text-white transition-colors" title="Pin Layar">
                    <i data-lucide="pin" class="w-3.5 h-3.5"></i>
                </button>
            `;

            tile.innerHTML = `
                <div class="hand-indicator items-center justify-center"><i data-lucide="hand" class="w-4 h-4"></i></div>
                ${adminControls}
                ${pinButtonHTML}
                <video id="video-${id}" autoplay playsinline ${isLocal ? 'muted' : ''}></video>
                <div class="user-label text-white uppercase tracking-tighter">${label}</div>
            `;
            container.appendChild(tile);
            document.getElementById(`video-${id}`).srcObject = stream;
            lucide.createIcons();
            refreshGrid();
        }

        // --- UTILS & MEDIA ---
        function endSession() {
            if (isRecording) stopRecording();
            setTimeout(() => location.reload(), 1000);
        }

        async function switchCamera() {
            if (!isAdminMode) return;
            try {
                currentFacingMode = (currentFacingMode === 'user' ? 'environment' : 'user');
                const oldTrack = myStream.getVideoTracks()[0];
                if (oldTrack) oldTrack.stop();
                const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: currentFacingMode } } });
                const newTrack = newStream.getVideoTracks()[0];
                myStream.removeTrack(oldTrack);
                myStream.addTrack(newTrack);
                for (let p in calls) {
                    const s = calls[p].peerConnection.getSenders().find(s => s.track?.kind === 'video');
                    if (s) s.replaceTrack(newTrack);
                }
                showNotif(`Kamera ${currentFacingMode === 'user' ? 'Depan' : 'Belakang'}`);
            } catch (err) { showNotif("Gagal ganti kamera."); }
        }

        function toggleMic() {
            if (isMuteLocked) return showNotif("Mic dikunci Admin!");
            const t = myStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            const b = document.getElementById('toggle-mic');
            b.classList.toggle('bg-red-500/20', !t.enabled);
            b.innerHTML = `<i data-lucide="${t.enabled ? 'mic' : 'mic-off'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        }

        function toggleVideo() {
            const t = myStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            const b = document.getElementById('toggle-vid');
            b.classList.toggle('bg-red-500/20', !t.enabled);
            b.innerHTML = `<i data-lucide="${t.enabled ? 'video' : 'video-off'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        }

        function removeVideoTile(id) {
            const t = document.getElementById(`tile-${id}`);
            if (t) { if (pinnedPeerId === id) togglePin(id); t.remove(); refreshGrid(); }
        }

        function refreshGrid() {
            const c = document.getElementById('video-container');
            if (c.classList.contains('has-pinned')) return;
            const tiles = c.querySelectorAll('.video-tile');
            let b = '100%';
            if (tiles.length >= 2) b = 'calc(50% - 0.5rem)';
            if (tiles.length >= 5) b = 'calc(33.33% - 0.67rem)';
            tiles.forEach(t => { t.style.flexBasis = b; t.style.maxWidth = b; });
        }

        function updateConnectionList() {
            const l = document.getElementById('connection-list');
            const ids = Object.keys(calls);
            if (ids.length === 0) { l.innerHTML = `<p class="text-[10px] text-slate-500 italic">Kosong...</p>`; return; }
            l.innerHTML = ids.map(id => `<div class="flex items-center justify-between bg-white/5 p-3 rounded-xl border border-white/5"><span class="text-[10px] font-bold text-white/70 uppercase truncate max-w-[150px]">${peerAliases[id] || id}</span><div class="w-2 h-2 bg-fuchsia-400 rounded-full"></div></div>`).join('');
        }

        function copyId() { navigator.clipboard.writeText(document.getElementById('my-peer-id').innerText).then(() => showNotif("Disalin!")); }
        function showNotif(t) { const n = document.getElementById('notif'); n.innerText = t; n.style.opacity = "1"; n.style.transform = "translate(-50%, -10px)"; setTimeout(() => { n.style.opacity = "0"; n.style.transform = "translate(-50%, 0)"; }, 3000); }
        function toggleChat() { document.getElementById('chat-panel').classList.toggle('active'); document.getElementById('chat-badge').classList.add('hidden'); }
        function sendMessage(e) { e.preventDefault(); const i = document.getElementById('chat-input'); const t = i.value.trim(); if (!t) return; Object.values(dataConnections).forEach(c => c.send({ type: 'chat', sender: myAlias, text: t })); appendMessage("Anda", t); i.value = ""; }
        function appendMessage(s, t) { const c = document.getElementById('chat-messages'); const d = document.createElement('div'); const m = s === "Anda"; d.className = `flex flex-col ${m ? 'items-end' : 'items-start'}`; d.innerHTML = `<span class="text-[8px] font-bold text-slate-500 uppercase mb-1">${s}</span><div class="${m ? 'bg-cyan-600 text-white' : 'bg-white/10 text-slate-200'} px-3 py-2 rounded-2xl text-xs max-w-[90%] shadow-lg">${t}</div>`; c.appendChild(d); c.scrollTop = c.scrollHeight; }
        function toggleHand() { isHandRaised = !isHandRaised; document.getElementById('toggle-hand').classList.toggle('text-yellow-400', isHandRaised); updateHandIndicator('local', isHandRaised); Object.values(dataConnections).forEach(c => c.send({ type: 'signal', action: 'raise-hand', status: isHandRaised })); }
        function updateHandIndicator(i, s) { const t = document.getElementById(`tile-${i}`); if (t) t.querySelector('.hand-indicator').style.display = s ? 'flex' : 'none'; }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
